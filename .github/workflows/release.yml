name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build signed release APK
    runs-on: ubuntu-latest
    environment: release-signing
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret in environment release-signing." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/release-signing.jks"
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "RELEASE_STORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Run Android lint
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" :app:lintDebug --stacktrace

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ env.RELEASE_STORE_FILE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" :app:assembleRelease --stacktrace

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WorkshopOnAndroid-${{ github.ref_name }}-release
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.APK
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes_file="docs/release/note/${tag}.md"
          shopt -s nullglob
          assets=(app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/*.APK)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No APK assets found for release publish." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            if [ -f "$notes_file" ]; then
              gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
            fi
          else
            if [ -f "$notes_file" ]; then
              gh release create "$tag" "${assets[@]}" --title "$tag" --notes-file "$notes_file"
            else
              gh release create "$tag" "${assets[@]}" --title "$tag" --generate-notes
            fi
          fi
